<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIFlow</title>
  <link rel="stylesheet" href="app.css" />
</head>

<body>
  <nav class="navbar">
    <img src="aiflow-logo.png" alt="AIFlow Logo" class="nav-logo" />
    <ul class="nav-links">
      <li>Features</li>
      <li>Pricing</li>
      <li>Contact</li>
    </ul>
    <div class="nav-action-buttons">
      <button class="nav-button">Get Started</button>
      <img src="hamburger-icon.png" alt="hamburger-menu" class="nav-hamburger-menu">
    </div>
  </nav>
  <section class="hero">
    <div class="hero-text">
      <span class="hero-span"> <img src="powered-icon.png" alt="powered" class="hero-powered-icon"> AI POWERED </span>
      <h1 class="hero-title">Build videos <br> with AI</h1>
      <p class="hero-content">
        Create personalized video content faster than ever. AIFlow helps you
        turn ideas into engaging videos in minutes.
      </p>
      <div class="hero-buttons">
        <button class="hero-button-start-building">Start building -></button>
        <button class="hero-button-learn-more">Learn more</button>
      </div>
    </div>
    <img src="aiflow-hero-image.png" alt="aiflow hero image" class="hero-image" />
  </section>
</body>

</html>
